{% extends "base.html" %}
{% block title %}Sign In — StudentMart{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 bg-gray-50">
  <div class="w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-navy rounded-xl mb-3">
        <span class="font-black text-white text-2xl">S</span>
      </div>
      <h1 class="text-2xl font-black text-gray-900">Sign In</h1>
      <p class="text-sm text-gray-500 mt-1">Access your StudentMart account</p>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm">
      <form method="POST" action="/login">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email</label>
          <input type="email" name="email" required placeholder="student@college.edu"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:border-primary"/>
        </div>
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <input type="password" name="password" required placeholder="••••••••"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:border-primary"/>
        </div>
        <button type="submit" class="w-full btn-primary justify-center py-3 text-sm rounded-lg">
          Sign In to StudentMart
        </button>
      </form>
      <div class="relative my-5"><div class="border-t border-gray-100"></div><span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-3 text-xs text-gray-400">New here?</span></div>
      <a href="/register" class="block text-center w-full border border-gray-300 rounded-lg py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-50">
        Create a StudentMart Account
      </a>
    </div>
  </div>
</div>
{% endblock %}
